application:
  datasource:
    mysql:
      url: jdbc:mysql://localhost:3306/datasync
      username: root
      password: xxxxxx        # your MySQL password

    sqlite:
      url: jdbc:sqlite:db/sqlite.db?journal_mode=WAL&busy_timeout=5000

  redis:
    master:
      host: localhost
      port: 6379
      password: xxxxxx        # your Redis password
    slave:
      host: localhost
      port: 6380
      password: xxxxxx        # your Redis password

  aws:
    s3:
      accesskey: xxxxxx       # your S3 access key (optional, only needed for S3 storage)
      secretkey: xxxxxx       # your S3 secret key
      region: auto
      endpoint: https://your-s3-endpoint
      bucket: your-bucket-name
      path-style-access: true

  netty:
    server:
      port: 8080
      basePath: /path/to/server/storage   # where synced files will be stored on server
    client:
      port: 8080
      host: localhost

  jwt:
    secretkey: xxxxxx         # run: openssl rand -base64 32
    freshTokenExpiration: 2592000000    # 30 days in ms
    accessTokenExpiration: 25920000000  # 300 days in ms
    token-name: Authorization
    uid: uid
    role: role

  mybatis:
    type-aliases-package: backend.model.entity
    configuration:
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
