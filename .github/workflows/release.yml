name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true

permissions:
  contents: write

jobs:
  build-client:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows installer
            os: windows-latest
            build_script: build:win
            artifacts: |
              sync-app/dist/*.exe
              sync-app/dist/*.blockmap
              sync-app/dist/latest*.yml
          - label: Linux packages
            os: ubuntu-latest
            build_script: build:linux
            artifacts: |
              sync-app/dist/*.AppImage
              sync-app/dist/*.deb
              sync-app/dist/latest*.yml

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build local client backend
        if: runner.os != 'Windows'
        working-directory: client-app
        run: |
          chmod +x ./mvnw
          ./mvnw -DskipTests package --no-transfer-progress

      - name: Build local client backend
        if: runner.os == 'Windows'
        working-directory: client-app
        shell: pwsh
        run: .\mvnw.cmd -DskipTests package --no-transfer-progress

      - name: Bundle Java runtime
        shell: bash
        run: |
          rm -rf sync-app/build/jre
          jlink \
            --add-modules java.se,java.instrument,jdk.crypto.ec,jdk.unsupported \
            --strip-debug \
            --no-man-pages \
            --no-header-files \
            --compress=2 \
            --output sync-app/build/jre

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sync-app/package-lock.json

      - name: Install Electron dependencies
        working-directory: sync-app
        run: npm ci

      - name: Build Electron package
        working-directory: sync-app
        run: npm run ${{ matrix.build_script }} -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: datasync-${{ runner.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: build-client
    runs-on: ubuntu-latest
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: DataSync ${{ github.event.inputs.tag || github.ref_name }}
          files: release-assets/*
          prerelease: true
          generate_release_notes: true
