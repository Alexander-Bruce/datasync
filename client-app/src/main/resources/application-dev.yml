application:
  datasource:
    sqlite:
      url: jdbc:sqlite:datasync-user.db?journal_mode=WAL&busy_timeout=5000

  netty:
    server:
      port: 8443
      basePath: /path/to/local/sync/folder   # local root directory for synced files
    client:
      port: 8443
      host: xxxxxx            # your server IP or hostname

  jwt:
    secretkey: xxxxxx         # must be identical to the server's JWT secretkey
    freshTokenExpiration: 2592000000    # 30 days in ms
    accessTokenExpiration: 25920000000  # 300 days in ms
    token-name: Authorization
    uid: uid
    role: role

  mybatis:
    type-aliases-package: backend.model.entity
    configuration:
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
